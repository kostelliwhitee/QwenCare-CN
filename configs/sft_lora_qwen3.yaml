stage: sft
base_model_name_or_path: Qwen/Qwen3-8B-Instruct
dataset_path: data/processed/train.json
eval_dataset_path: data/processed/validation.json
output_dir: runs/sft_qwen3_lora
cuda_visible_devices: "5,6"

finetuning:
  type: lora
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 2
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  bf16: true
  gradient_checkpointing: true
