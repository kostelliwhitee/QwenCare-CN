stage: sft_v2
base_model_name_or_path: models/Qwen3-8B
dataset_path: data/processed/v2/train.json
eval_dataset_path: data/processed/v2/validation.json
output_dir: runs/sft_qwen3_v2
cuda_visible_devices: "5,6"

finetuning:
  type: lora
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  max_seq_length: 1536
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 1.0
  learning_rate: 5.0e-5
  warmup_ratio: 0.05
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  bf16: true
  gradient_checkpointing: true
  loss_mode: assistant_only
  thinking_mode: no_think
